<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Complementary colors to your accent scheme at 50% opacity -->
    <!-- Complement to violet #8B5CF6 is spring green #5CF68B -->
    <radialGradient id="grad-comp-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5CF68B;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#5CF68B;stop-opacity:0.1" />
    </radialGradient>
    <!-- Complement to cyan #06B6D4 is red #F6065C -->  
    <radialGradient id="grad-comp-cyan" cx="30%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#F6065C;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#F6065C;stop-opacity:0.1" />
    </radialGradient>
    <!-- Complement to amber #FBBF24 is blue #244FFB -->
    <radialGradient id="grad-comp-amber" cx="70%" cy="80%" r="30%">
      <stop offset="0%" style="stop-color:#244FFB;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#244FFB;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Subtle geometric pattern to add texture without noise -->
    <pattern id="geoPattern" patternUnits="userSpaceOnUse" width="25" height="25">
      <path d="M12.5 0 L0 12.5 L12.5 25 L25 12.5 Z" 
            fill="none" 
            stroke="rgba(255,255,255,0.08)" 
            stroke-width="0.3"/>
    </pattern>
  </defs>
  
  <!-- Base: near-black for dark gloss clarity -->
  <rect width="100%" height="100%" fill="#0A0A0A"/>
  
  <!-- Complementary color washes at 50% opacity creating visual vibration -->
  <rect width="100%" height="100%" fill="url(#grad-comp-violet)" />
  <rect width="100%" height="100%" fill="url(#grad-comp-cyan)" />
  <rect width="100%" height="100%" fill="url(#grad-comp-amber)" />
  
  <!-- Subtle geometric overlay for depth -->
  <rect width="100%" height="100%" fill="url(#geoPattern)" />
  
  <!-- Very subtle vignette to focus attention inward -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#vignette)" />
</svg>
