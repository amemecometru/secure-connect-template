<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle radial gradients for depth -->
    <radialGradient id="grad-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.03" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="grad-cyan" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.025" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="grad-amber" cx="80%" cy="70%" r="30%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:0.02" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:0" />
    </radialGradient>
    
    <!-- Subtle geometric pattern -->
    <pattern id="geoPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <path d="M10 0 L0 10 L10 20 L20 10 Z" 
            fill="none" 
            stroke="rgba(255,255,255,0.03)" 
            stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Base dark layer -->
  <rect width="100%" height="100%" fill="#0F172A"/>
  
  <!-- Gradient overlays -->
  <rect width="100%" height="100%" fill="url(#grad-violet)" />
  <rect width="100%" height="100%" fill="url(#grad-cyan)" />
  <rect width="100%" height="100%" fill="url(#grad-amber)" />
  
  <!-- Subtle geometric overlay -->
  <rect width="100%" height="100%" fill="url(#geoPattern)" />
</svg>
