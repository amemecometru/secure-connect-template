<svg width="240" height="60" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#8B5CF6" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Claw Mark Symbol -->
  <g transform="translate(20,30)">
    <path d="M0,0 
             C-5,-15 5,-25 0,-35 
             C-5,-45 5,-55 0,-65 
             L5,-65 
             C10,-55 20,-45 15,-35 
             C20,-25 10,-15 5,-5 
             Z" 
          fill="url(#clawGrad)"
          filter="url(#glow)"/>
    <circle cx="-2" cy="-32" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="2" cy="-50" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- Wordmark -->
  <text x="60" y="20" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-weight="600" font-size="18" fill="#FFFFFF" letter-spacing="-0.5">
    Vibe
  </text>
  <text x="110" y="20" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-weight="800" font-size="22" fill="url(#clawGrad)" letter-spacing="-0.5">
    Claw
  </text>
  
  <!-- Subtle underline accent -->
  <rect x="110" y="25" width="70" height="2" fill="url(#clawGrad)" opacity="0.3"/>
</svg>
